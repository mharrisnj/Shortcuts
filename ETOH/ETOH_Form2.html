<html>
<head>
	<meta name="viewport" 
		content="width=device-width,
			initial-scale=0.8,
			minimum-scale=0.5,
			maximum-scale=5,
			user-scalable=yes">
			
	<style>
	body { 
			font-family: -apple-system; 
			background: #F2F2F7; 
			color: #000000; 
			padding: 20px;
			min-height: 100vh;
			min-height: 100dvh;
	}
	label { 
			display: block; 
			margin-top: 15px; 
			color: #3C3C43; 
			font-size: 0.9em; 
			font-weight: 500;
	}
	input { 
			width: 50vw; 
			padding: 12px; 
			margin-top: 5px; 
			background: #FFFFFF; 
			border: 1px solid #C6C6C8; 
			border-radius: 10px; 
			color: #000000; 
			font-size: 16px; 
			box-sizing: border-box; 
			-webkit-appearance: none;
	}
	button {
			Display:block;
			width: 50vw; 
			padding: 15px; 
			margin-top: 25px; 
			background: #007AFF; 
			border: none; 
			border-radius: 12px; 
			color: white; 
			font-weight: 600; 
			font-size: 17px; 
	}
	h3 {
		
		text-align: center !important;
		font-weight: 700;
		width: 50vw;
		}
			/*font-weight:"bold";
			display: block; 
			margin-top: 15px; 
			width: 20vw
			text-align: center;
			color: #3C3C43; 
			font-size: 0.9em; 
			font-weight: 500;*/
	}
	</style>
</head>
<body>
	<h3>E-Mix Calculator</h3>
	
	<form id="calculator-interface">
			<div id="err" style="margin-top:10px;color:#d00;font-weight:600;"></div>
			
			<label>Miles to Refill</label>
			<input type="number" id="mr" step="any" required>
			
			<label>Mileage Since Last Refill (mpg)</label>
			<input type="number" id="mpg" step="any" required>
			
			<label>Current Ethanol Tank %</label>
			<input type="number" id="et" step="any" required>
			
			<label>Pump E85 Content % (e.g. 76)</label>
			<input type="number" id="epump" step="any" required>
			
			<label>Desired Ethanol %</label>
			<input type="number" id="ef" step="any" required>

			<button type="submit">Calculate Mix</button>

			<label>E85 to add (gal)</label>
			<input type="number" id="gf" readonly>
			
	</form>

	
	<script>
			
		document.getElementById('calculator-interface').addEventListener('submit', function (e) {
			e.preventDefault();
			
			const inputErr = document.getElementById('err');
			inputErr.textContent = "";
			
			if (!this.checkValidity()) {
				this.reportValidity();
		
				document.getElementById('gf').value = "";
				inputErr.textContent = "Each field must contain a number";
				return;
			}

			calculate();
		});
		
		
		function calculate() {
			const mr = document.getElementById('mr').value;
			const mpg = document.getElementById('mpg').value;
			const et = document.getElementById('et').value;
			const epump = document.getElementById('epump').value;
			const ef = document.getElementById('ef').value;
			
			const g1 = mr/mpg;
			const gf = g1*(ef - et)/(epump - ef);
			
			if (ef === epump) {
				err.textContent = "E-85 content and the desired content cannot be the same.";
				return;
			}

			document.getElementById('gf').value = gf.toFixed(2);
		}
		
		
	</script>
</body>
</html>
