<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complex Menu Example</title>
<style>
body { font-family: Arial, sans-serif; background: #fff; margin: 0; padding: 0; }
nav ul { list-style: none; margin: 0; padding: 0; }
nav > ul > li { display: inline-block; position: relative; }
nav a { display: block; padding: 12px 18px; text-decoration: none; color: #222; }
nav li:hover > a { background: #eee; }
nav li ul { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #ccc; }
nav li:hover > ul { display: block; }
nav li ul li { width: 180px; }
nav li ul li ul { left: 100%; top: 0; }
</style>
</head>
<body>
<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li>
      <a href="#">Products ▼</a>
      <ul>
        <li><a href="#">Laptops</a></li>
        <li>
          <a href="#">Phones ▶</a>
          <ul>
            <li><a href="#">Android</a></li>
            <li><a href="#">iOS</a></li>
            <li><a href="#">Other</a></li>
          </ul>
        </li>
        <li><a href="#">Accessories</a></li>
      </ul>
    </li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>
<script>
// You can add JavaScript here for additional behaviors
// For example: close menu on outside click or animate transition
</script>
</body>
</html>
